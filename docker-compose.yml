name: blog-root

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - blog_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - blog_network

  elasticsearch:
    build:
      context: ./server
      dockerfile: docker/elasticsearch/Dockerfile
      args:
        ELASTICSEARCH_IMAGE: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
        IK_VERSION: 8.13.4
        PINYIN_VERSION: 8.13.4
    image: blog-elasticsearch-ik:8.13.4
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ES_HOST_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - blog_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      SERVER_NAME: blog-kibana
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_HOST_PORT:-5601}:5601"
    networks:
      - blog_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: blog-server:local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      APP_NAME: ${APP_NAME:-Blog System}
      APP_DESC: ${APP_DESC:-Personal Blog System API}
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      ES_NODE: http://elasticsearch:9200
      ES_USERNAME: ""
      ES_PASSWORD: ""
      ES_CA_CERT_PATH: ""
      ES_TLS_REJECT_UNAUTHORIZED: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-blog_auth_token}
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: strict
      AUTH_STEP_UP_COOKIE_NAME: ${AUTH_STEP_UP_COOKIE_NAME:-blog_admin_step_up}
      AUTH_STEP_UP_COOKIE_PATH: /api/admin
      AUTH_STEP_UP_TTL: ${AUTH_STEP_UP_TTL:-10m}
      AUTH_STEP_UP_WINDOW_MS: ${AUTH_STEP_UP_WINDOW_MS:-600000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      CORS_ALLOW_REQUESTS_WITHOUT_ORIGIN: "true"
      SWAGGER_ENABLED: "true"
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_NICKNAME: ${SUPER_ADMIN_NICKNAME:-系统超管}
      ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DOCKER_BOOTSTRAP_INIT_DB: ${DOCKER_BOOTSTRAP_INIT_DB:-true}
      DOCKER_BOOTSTRAP_SEED_DEMO: ${DOCKER_BOOTSTRAP_SEED_DEMO:-true}
      DOCKER_BOOTSTRAP_REINDEX: ${DOCKER_BOOTSTRAP_REINDEX:-true}
      DOCKER_BOOTSTRAP_WAIT_TIMEOUT_MS: ${DOCKER_BOOTSTRAP_WAIT_TIMEOUT_MS:-180000}
    ports:
      - "${SERVER_HOST_PORT:-3000}:3000"
    volumes:
      - server_logs:/app/logs
      - server_backups:/app/backups
      - server_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 8s
      retries: 20
      start_period: 40s
    networks:
      - blog_network

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ASSET_CDN: /
        VITE_PAGE_CACHE_TTL: ${VITE_PAGE_CACHE_TTL:-60000}
    image: blog-web:local
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    networks:
      - blog_network

volumes:
  mysql_data:
  redis_data:
  es_data:
  server_logs:
  server_backups:
  server_uploads:

networks:
  blog_network:
    driver: bridge
